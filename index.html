<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Flashcard Nam</title>

<style>

body{
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#d4f8e8,#e8f6ff);
overflow-x:hidden;
}

/* input */

input{
padding:10px;
margin:5px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
background:#4CAF50;
color:white;
cursor:pointer;
}

button:hover{
background:#43a047;
}

/* flashcard */

.card{
width:320px;
height:220px;
margin:30px auto;
perspective:1000px;
}

.inner{
width:100%;
height:100%;
position:relative;
transition:transform 0.8s;
transform-style:preserve-3d;
}

.card.flip .inner{
transform:rotateY(180deg);
}

.side{
position:absolute;
width:100%;
height:100%;
border-radius:15px;
backface-visibility:hidden;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:white;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.back{
background:#4CAF50;
color:white;
transform:rotateY(180deg);
}

img{
max-width:90px;
margin-top:10px;
border-radius:8px;
}

/* hoa rơi */

.flower{
position:fixed;
top:-10px;
font-size:20px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10px)}
100%{transform:translateY(100vh)}
}

/* list */

#list{
margin-top:20px;
}

</style>
</head>

<body>

<h1>🌸 Flashcard Học Từ 🌿</h1>

<input id="word" placeholder="Từ">
<input id="meaning" placeholder="Nghĩa">
<input id="image" placeholder="Link ảnh minh hoạ">

<br>
<button onclick="addCard()">Thêm</button>

<div class="card" id="card" onclick="flipCard()">

<div class="inner">

<div class="side front">

<div id="frontText">Nhấn để học</div>
<img id="frontImg">

</div>

<div class="side back">

<div id="backText">Nghĩa</div>
<img id="backImg">

</div>

</div>

</div>

<button onclick="nextCard()">Thẻ tiếp</button>

<h2>📚 Danh sách từ</h2>
<div id="list"></div>

<script>

let cards=[]
let index=0

/* load dữ liệu */

let saved=localStorage.getItem("cards")
if(saved){
cards=JSON.parse(saved)
updateList()
showCard()
}

function save(){
localStorage.setItem("cards",JSON.stringify(cards))
}

function addCard(){

let word=document.getElementById("word").value
let meaning=document.getElementById("meaning").value
let image=document.getElementById("image").value

if(word==""||meaning==""){
alert("Nhập từ và nghĩa")
return
}

cards.push({word,meaning,image})

save()
updateList()
showCard()

document.getElementById("word").value=""
document.getElementById("meaning").value=""
document.getElementById("image").value=""

}

function showCard(){

if(cards.length==0)return

let card=cards[index]

frontText.innerText=card.word
backText.innerText=card.meaning

frontImg.src=card.image
backImg.src=card.image

cardDiv=document.getElementById("card")
cardDiv.classList.remove("flip")

}

function flipCard(){
document.getElementById("card").classList.toggle("flip")
}

function nextCard(){

if(cards.length==0)return

index=(index+1)%cards.length

showCard()

}

function updateList(){

let html=""

cards.forEach(c=>{
html+=`<p>${c.word} - ${c.meaning}</p>`
})

document.getElementById("list").innerHTML=html

}

/* hoa rơi */

function createFlower(){

let f=document.createElement("div")
f.className="flower"
f.innerHTML="🌸"

f.style.left=Math.random()*100+"vw"
f.style.animationDuration=3+Math.random()*5+"s"

document.body.appendChild(f)

setTimeout(()=>f.remove(),8000)

}

setInterval(createFlower,500)

</script>

</body>
</html>
