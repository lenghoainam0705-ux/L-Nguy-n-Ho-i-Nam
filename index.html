<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Flashcard Học Từ Vựng</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background:linear-gradient(135deg,#c9f7d2,#e6f7ff);
    overflow:hidden;
}

h1{
    margin-top:20px;
}

input{
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:10px;
    background:#4CAF50;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#45a049;
}

/* Flashcard */

.card{
    width:300px;
    height:200px;
    margin:40px auto;
    perspective:1000px;
}

.inner{
    position:relative;
    width:100%;
    height:100%;
    transition: transform 0.8s;
    transform-style: preserve-3d;
}

.card.flip .inner{
    transform: rotateY(180deg);
}

.front,.back{
    position:absolute;
    width:100%;
    height:100%;
    backface-visibility:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:15px;
    font-size:25px;
}

.front{
    background:white;
}

.back{
    background:#4CAF50;
    color:white;
    transform:rotateY(180deg);
}

/* hoa rơi */

.flower{
    position:absolute;
    top:-20px;
    font-size:20px;
    animation:fall linear infinite;
}

@keyframes fall{
    to{
        transform:translateY(100vh);
    }
}
</style>
</head>

<body>

<h1>📚 Flashcard Học Từ</h1>

<input id="word" placeholder="Nhập từ">
<input id="meaning" placeholder="Nhập nghĩa">
<button onclick="addCard()">Thêm</button>

<div class="card" onclick="flipCard()" id="card">
<div class="inner">

<div class="front" id="front">
Nhấn để học
</div>

<div class="back" id="back">
Nghĩa
</div>

</div>
</div>

<button onclick="nextCard()">Thẻ tiếp</button>

<script>

let cards=[]
let index=0

function addCard(){
let word=document.getElementById("word").value
let meaning=document.getElementById("meaning").value

if(word && meaning){
cards.push({word,meaning})
document.getElementById("word").value=""
document.getElementById("meaning").value=""
showCard()
}
}

function showCard(){
if(cards.length==0) return
document.getElementById("front").innerText=cards[index].word
document.getElementById("back").innerText=cards[index].meaning
document.getElementById("card").classList.remove("flip")
}

function flipCard(){
document.getElementById("card").classList.toggle("flip")
}

function nextCard(){
if(cards.length==0) return
index=(index+1)%cards.length
showCard()
}

/* hoa rơi */

function createFlower(){
let flower=document.createElement("div")
flower.className="flower"
flower.innerHTML="🌸"
flower.style.left=Math.random()*100+"vw"
flower.style.animationDuration=(Math.random()*3+2)+"s"
document.body.appendChild(flower)

setTimeout(()=>flower.remove(),5000)
}

setInterval(createFlower,300)

</script>

</body>
</html>
